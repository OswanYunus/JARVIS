<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>J.A.R.V.I.S</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Local AI</p>
          <h1>J.A.R.V.I.S</h1>
        </div>

        <label class="field">
          <span>Model</span>
          <select id="modelSelect"></select>
        </label>

        <div class="status-line">
          <span>Tools</span>
          <strong id="toolStatus">Checking</strong>
        </div>

        <button id="clearChat" class="secondary" type="button">Clear chat</button>

        <section class="rules-panel">
          <div class="rules-header">
            <h2>Rules</h2>
            <button id="saveRules" class="secondary" type="button">Save</button>
          </div>
          <textarea id="rulesEditor" spellcheck="false"></textarea>
        </section>
      </aside>

      <section class="chat">
        <div id="messages" class="messages"></div>

        <form id="chatForm" class="composer">
          <textarea id="messageInput" placeholder="Ask J.A.R.V.I.S..." rows="2"></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
